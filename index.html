<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaSaaS – Modern Cloud Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* SAME CSS — only footer tweak added */
footer {
  background: #1e1b4b;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.footer-links { margin-left: auto; display:flex; gap:20px; }
</style>

<!-- KEEP REST OF ORIGINAL CSS EXACTLY SAME -->
</head>

<body>

<!-- ================= HOME ================= -->
<div id="page-home" class="page active">

<nav>
  <a class="nav-logo" onclick="goTo('home')">NovaSaaS</a>
  <span class="nav-center">Modern Cloud Platform</span>
  <div class="nav-right">
    <a class="nav-link active" onclick="goTo('products')">Products</a>
    <a class="nav-link" onclick="goTo('solutions')">Solutions</a>
    <!-- LOGIN REMOVED -->
  </div>
</nav>

<div class="page-body">

<!-- ✅ RESHUFFLED TOGGLES -->
<div class="toggle-row">
  <span>Agam Singh</span>
  <button id="toggle-agam" class="toggle off" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button>
</div>

<div class="toggle-row">
  <span>Sattva</span>
  <button id="toggle-sattva" class="toggle on" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button>
</div>

<div class="toggle-row">
  <span>Amit Nkhade</span>
  <button id="toggle-amit" class="toggle on" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button>
</div>

</div>

<!-- ✅ FOOTER WITH LOGIN -->
<footer>
  <div class="footer-logo">NovaSaaS</div>

  <div class="footer-links">
    <a class="footer-link" onclick="goTo('products')">Products</a>
    <a class="footer-link" onclick="goTo('solutions')">Solutions</a>
  </div>

  <button id="login-btn-footer" class="btn-login" onclick="goTo('login')">
    Login
  </button>
</footer>
</div>


<!-- ================= PRODUCTS ================= -->
<div id="page-products" class="page">

<nav>
  <a class="nav-logo" onclick="goTo('home')">NovaSaaS</a>
  <span class="nav-center">Modern Cloud Platform</span>
  <div class="nav-right">
    <a class="nav-link active" onclick="goTo('products')">Products</a>
    <a class="nav-link" onclick="goTo('solutions')">Solutions</a>
  </div>
</nav>

<footer>
  <div class="footer-logo">NovaSaaS</div>

  <div class="footer-links">
    <a class="footer-link" onclick="goTo('products')">Products</a>
    <a class="footer-link" onclick="goTo('solutions')">Solutions</a>
  </div>

  <button id="login-btn-footer" class="btn-login" onclick="goTo('login')">
    Login
  </button>
</footer>
</div>


<!-- ================= LOGIN ================= -->
<div id="page-login" class="page">

<nav>
  <a class="nav-logo" onclick="goTo('home')">NovaSaaS</a>
</nav>

<div class="login-card">

<input id="login-email" type="email" placeholder="email">
<input id="login-password" type="password" placeholder="password">

<button class="btn-signin" onclick="handleLogin()">Sign In</button>

</div>

<footer>
  <button id="login-btn-footer" class="btn-login" onclick="goTo('login')">
    Login
  </button>
</footer>
</div>


<script>
function goTo(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function handleLogin(){
  const email=document.getElementById('login-email').value;
  const pass=document.getElementById('login-password').value;

  if(email==="a@gmail.com" && pass==="abc"){
    goTo('home');
  } else {
    alert("Invalid credentials");
  }
}
</script>

</body>
</html>
